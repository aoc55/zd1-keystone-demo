- job:
    name: zuul-keystone-demo-dsvm-functional
    parent: keystone-dsvm-functional # openstack/keystone job 을 기반으로 재정의
    nodeset:
      nodes:
        - name: controller
          label: aoc55-osp-vm-4c-8g
      groups:
        - name: tempest
          nodes:
            - controller
    timeout: 4200
    pre-run: playbooks/use-keystone-fork.yaml
    required-projects:
      - name: openstack/keystone
        override-checkout: stable/2025.1
      - name: openstack/keystone-tempest-plugin
        override-checkout: master
      - name: openstack/devstack
        override-checkout: stable/2025.1
    vars:
      # devstack-minimal이 devstack_localrc에 PUBLIC_BRIDGE_MTU: '{{ external_bridge_mtu }}'를
      # 포함하므로, freeze 시점에 external_bridge_mtu가 undefined이면 devstack_localrc 전체가
      # frozen_hostvars에서 제외된다. 환경 고정값으로 미리 선언해 freeze를 통과시킨다.
      # (local_mtu=1442, overhead=vxlan30+ipv6_40=70 → 1442-70=1372)

      # 지우기 테스트
      # external_bridge_mtu: 1372
      devstack_localrc:
        TEMPEST_PLUGINS: "/opt/stack/keystone-tempest-plugin"
        KEYSTONE_ENFORCE_SCOPE: true
        DATABASE_PASSWORD: secretdatabase
        RABBIT_PASSWORD: secretrabbit
        ADMIN_PASSWORD: secretadmin
        SERVICE_PASSWORD: secretservice
      devstack_plugins:
        keystone: https://opendev.org/openstack/keystone
    irrelevant-files: []

